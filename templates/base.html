<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Anmol Sriwastava{% endblock %}</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700;800&family=Lato:wght@300;400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Main CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>

  {% block extra_css %}{% endblock %}
</head>
<body>

<!-- Nav -->
<nav class="site-nav" id="navbar">
  <div class="nav-inner">
    <a class="nav-logo" href="/">Anmol Sriwastava</a>

    <button class="nav-toggle" id="navToggle">
      <span></span><span></span><span></span>
    </button>

    <ul class="nav-links" id="navLinks">
      <li><a href="/" class="{{ 'active' if request.path == '/' }}">Home</a></li>
      <li><a href="/resources" class="{{ 'active' if '/resources' in request.path or '/class' in request.path }}">Resources</a></li>
      <li><a href="/iot" class="{{ 'active' if '/iot' in request.path }}">Robotics & IoT</a></li>
      <li><a href="/projects" class="{{ 'active' if '/projects' in request.path }}">Projects</a></li>
      <li><a href="/blog" class="{{ 'active' if '/blog' in request.path }}">Blog</a></li>
      <li><a href="/about" class="{{ 'active' if '/about' in request.path }}">About</a></li>
    </ul>
  </div>
</nav>

<!-- Content -->
<main>
  {% block content %}{% endblock %}
</main>

<!-- Footer -->
<!-- Footer -->
<footer class="site-footer">
  <div class="footer-inner">
    <p>© 2025 Anmol Sriwastava · ISI Kolkata</p>
    <div class="footer-links">
      <a href="https://github.com/anmolsriwastava" target="_blank"><i class="fab fa-github"></i> GitHub</a>
      <a href="https://www.linkedin.com/in/anmol-sriwastava/" target="_blank"><i class="fab fa-linkedin-in"></i> LinkedIn</a>
      <a href="/blog">Blog</a>
      <a href="/about">About</a>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Mobile nav toggle
  document.getElementById('navToggle').addEventListener('click', function() {
    document.getElementById('navLinks').classList.toggle('open');
  });

  // Sticky nav shadow
  window.addEventListener('scroll', function() {
    const nav = document.getElementById('navbar');
    nav.classList.toggle('scrolled', window.scrollY > 20);
  });
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
