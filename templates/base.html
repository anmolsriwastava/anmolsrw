<body class="dark-theme">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <div class="logo-container">
                    <i class="fas fa-code logo-icon"></i>
                    <span class="logo-text">
                        <strong>ANMOL</strong>SRIWASTAVA
                    </span>
                </div>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link glow-hover" href="/">
                            <i class="fas fa-home"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link glow-hover" href="/class12">
                            <i class="fas fa-laptop-code"></i> Class 12 CS
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link glow-hover" href="/class11">
                            <i class="fas fa-code"></i> Class 11 CS
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link glow-hover" href="/iot">
                            <i class="fas fa-microchip"></i> IOT
                        </a>
                    </li>
                </ul>
            </div>
        </div>

    <!-- Main Content -->
    <main class="container mt-4">
        {% block content %}{% endblock %}

    <footer class="mt-5">

            <div class="row">
                <div class="col-md-6">
                    <div class="footer-logo">

                </div>
                <div class="col-md-6 text-end">
                    <p>© 2025 All Rights Reserved</p>
                    <div class="social-icons">

    </a>
    <a href="https://www.instagram.com/anmolsriwastava/" class="social-icon" target="_blank">
        <i class="fab fa-instagram"></i>
    </a>
    <a href="anmol.isik@gmail.com" class="social-icon">
